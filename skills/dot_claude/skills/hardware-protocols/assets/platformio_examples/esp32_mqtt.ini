# PlatformIO Configuration for ESP32 with MQTT
# Example: T-Embed device in Orbit project
#
# Usage:
#   1. Copy to your project as platformio.ini
#   2. Customize pins, WiFi credentials, MQTT broker
#   3. Build: pio run
#   4. Upload: pio run --target upload
#   5. Monitor: pio device monitor

[env:lilygo-t-embed]
platform = espressif32
board = esp32dev  # Or specific board like ttgo-t-display
framework = espidf

# Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    # WiFi credentials (use environment variables in production)
    -DWIFI_SSID=\"YourSSID\"
    -DWIFI_PASSWORD=\"YourPassword\"
    # MQTT broker
    -DMQTT_BROKER=\"192.168.1.100\"
    -DMQTT_PORT=1883
    # Device identification
    -DDEVICE_ID=\"tembed-01\"

# Monitor settings
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    time

# Upload settings
upload_speed = 921600

# Dependencies
lib_deps =
    # MQTT client
    espressif/esp-mqtt @ ^1.2.0
    # JSON parsing
    bblanchon/ArduinoJson @ ^6.21.0
    # Display driver (ST7789)
    bodmer/TFT_eSPI @ ^2.5.0

# Partition table (for OTA updates)
board_build.partitions = partitions.csv

# Flash size
board_upload.flash_size = 4MB

# =============================================================================
# Pin Definitions (add to sdkconfig or main.h)
# =============================================================================
#
# SPI Display (ST7789):
#   MOSI   = GPIO 23
#   CLK    = GPIO 18
#   CS     = GPIO 5
#   DC     = GPIO 17
#   RST    = GPIO 16
#   BL     = GPIO 4
#
# I2C (sensors):
#   SDA    = GPIO 21
#   SCL    = GPIO 22
#
# UART (debug/GPS):
#   TX     = GPIO 1
#   RX     = GPIO 3
#
# Battery ADC:
#   VBAT   = GPIO 35

