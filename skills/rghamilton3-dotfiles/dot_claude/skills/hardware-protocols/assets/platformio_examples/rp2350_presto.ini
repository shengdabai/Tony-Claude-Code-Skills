# PlatformIO Configuration for RP2350 (Pimoroni Presto)
# Example: Presto device in Orbit project
#
# Usage:
#   1. Copy to your project as platformio.ini
#   2. Customize based on Presto hardware
#   3. Build: pio run
#   4. Upload: pio run --target upload

[env:presto]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico2  # RP2350-based board
framework = arduino  # Or use pico-sdk for lower-level access

# Build flags
build_flags =
    -DPICO_BOARD=presto
    -DUSE_TINYUSB
    # Display configuration
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=240
    -DSPI_FREQUENCY=40000000
    # Device identification
    -DDEVICE_ID=\"presto-01\"

# Monitor settings
monitor_speed = 115200

# Upload settings
upload_protocol = picotool

# Dependencies
lib_deps =
    # Display driver
    pimoroni/Pimoroni Pico Libraries
    # BLE (if using NimBLE)
    h2zero/NimBLE-Arduino @ ^1.4.0
    # MQTT client
    knolleary/PubSubClient @ ^2.8

# =============================================================================
# Pin Definitions (Pimoroni Presto)
# =============================================================================
#
# SPI Display (ST7789):
#   MOSI   = GPIO 19
#   CLK    = GPIO 18
#   CS     = GPIO 17
#   DC     = GPIO 16
#   RST    = GPIO 21
#   BL     = GPIO 20
#
# I2C (onboard sensors):
#   SDA    = GPIO 4
#   SCL    = GPIO 5
#
# BLE (built-in):
#   Uses RP2350 wireless subsystem
#
# User buttons/LEDs:
#   USER_A = GPIO 12
#   USER_B = GPIO 13
#   LED    = GPIO 25

