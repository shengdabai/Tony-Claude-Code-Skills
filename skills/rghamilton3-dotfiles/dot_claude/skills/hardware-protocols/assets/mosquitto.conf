# Mosquitto MQTT Broker Configuration for Orbit
# Production-ready configuration with TCP + WebSocket support
#
# Installation:
#   sudo cp mosquitto.conf /etc/mosquitto/mosquitto.conf
#   sudo systemctl restart mosquitto
#   sudo systemctl enable mosquitto
#
# Testing:
#   TCP:       mosquitto_pub -h localhost -t test -m "hello"
#   WebSocket: Use mqtt.js or similar WebSocket MQTT client

# =============================================================================
# General Configuration
# =============================================================================

# Persistence settings
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_dest file /var/log/mosquitto/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection logs (useful for debugging)
connection_messages true

# Log timestamp
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# =============================================================================
# TCP Listener (Port 1883)
# Standard MQTT for embedded devices (Presto, T-Embed, Jetson clients)
# =============================================================================

listener 1883
protocol mqtt

# Allow anonymous connections (disable for production with auth)
allow_anonymous true

# Maximum QoS level (0, 1, or 2)
max_qos 2

# Retained messages
max_retained_messages 1000
retain_available true

# Message size limit (10 MB)
message_size_limit 10485760

# =============================================================================
# WebSocket Listener (Port 9001)
# WebSocket MQTT for Stream Deck plugin and web clients
# =============================================================================

listener 9001
protocol websockets

# WebSocket path (default is "/")
# Some clients expect "/mqtt" path
# Uncomment to change default path:
# http_dir /var/www/mosquitto

# Allow anonymous connections (same as TCP)
allow_anonymous true

# =============================================================================
# Security (Optional - uncomment to enable)
# =============================================================================

# Password file (create with: mosquitto_passwd -c /etc/mosquitto/passwd username)
# password_file /etc/mosquitto/passwd

# ACL file for topic permissions
# acl_file /etc/mosquitto/acl

# Example ACL rules (in /etc/mosquitto/acl):
# # Allow all users to subscribe to orbit/# topics
# pattern read orbit/#
#
# # Allow all users to publish to orbit/device/# topics
# pattern write orbit/device/#
#
# # Allow only admin user full access
# user admin
# topic readwrite #

# =============================================================================
# TLS/SSL Configuration (Optional - uncomment to enable)
# =============================================================================

# Secure WebSocket listener (port 9002)
# listener 9002
# protocol websockets
# cafile /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile /etc/mosquitto/certs/server.key
# require_certificate false

# TLS version
# tls_version tlsv1.2

# =============================================================================
# Performance Tuning
# =============================================================================

# Maximum connections (increase for large deployments)
max_connections 100

# Maximum queued messages per client
max_queued_messages 1000

# Queue QoS 0 messages (disabled by default)
queue_qos0_messages false

# Upgrade QoS (if client subscribes with QoS 0 but message sent with QoS 1)
upgrade_outgoing_qos false

# =============================================================================
# Client Settings
# =============================================================================

# Client keepalive timeout (seconds)
# If no PING received within 1.5 * keepalive, disconnect client
max_keepalive 65535

# Auto-assign client ID if not provided
# allow_zero_length_clientid true
# auto_id_prefix auto-

# =============================================================================
# Persistence Settings
# =============================================================================

# Autosave interval (seconds)
# Write retained messages and subscriptions to disk
autosave_interval 60

# Persist QoS 1/2 messages
autosave_on_changes false

# =============================================================================
# Bridge Configuration (Optional - for multi-broker setups)
# =============================================================================

# Example: Bridge to cloud MQTT broker
# connection bridge-to-cloud
# address mqtt.example.com:1883
# topic orbit/# both 1
# bridge_attempt_unsubscribe false
# bridge_protocol_version mqttv311
# cleansession false
# notifications false
# start_type automatic

# =============================================================================
# Monitoring
# =============================================================================

# System topic tree (broker statistics)
# Enable to publish stats to $SYS/# topics
sys_interval 60

# =============================================================================
# Notes for Orbit System
# =============================================================================

# Topic Structure:
#   orbit/timer/state/current          - Current timer state (retained)
#   orbit/timer/control/start          - Command to start timer
#   orbit/device/presto/status         - Presto device status (retained)
#   orbit/alert/visual/all             - Visual alert to all devices
#
# QoS Recommendations:
#   QoS 0: Frequent sensor updates (heartbeat, RSSI)
#   QoS 1: Commands and state changes (timer control, alerts)
#   QoS 2: Critical operations (rare - usually QoS 1 is sufficient)
#
# Retained Messages:
#   Use for state topics that new clients need immediately
#   Examples: timer state, device status, configuration
#
# Last Will and Testament:
#   Set LWT on connection to detect unexpected disconnects
#   Example: orbit/device/{id}/status -> {"online": false}
#
# Firewall Rules:
#   sudo ufw allow 1883/tcp    # MQTT TCP
#   sudo ufw allow 9001/tcp    # MQTT WebSocket
#   sudo ufw allow 9002/tcp    # MQTT Secure WebSocket (if using TLS)
